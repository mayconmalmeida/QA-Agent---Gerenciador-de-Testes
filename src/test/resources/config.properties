# ===========================================
# QA Agent - Configurações de Automação QA
# ===========================================

# -------------------------------------------
# Ambiente
# -------------------------------------------
base.url=http://10.8.0.20/ViewLogin
environment=test

# -------------------------------------------
# Credenciais padrão (sobrescritas pelo .env em CI)
# -------------------------------------------
user.username=12345678909
user.password=cert@0601

# -------------------------------------------
# Browser
# -------------------------------------------
browser.type=chromium
headless=false
slow.motion.ms=50
timeout.default=15

# -------------------------------------------
# Screenshots — apenas em falha
# -------------------------------------------
screenshot.em.falha=true
screenshot.em.cada.passo=false
screenshot.pasta=output/screenshots

# -------------------------------------------
# Relatório HTML
# -------------------------------------------
relatorio.output=output/reports/relatorio.html
relatorio.titulo=QA Agent - Relatório de Testes
relatorio.ambiente=Testes
relatorio.abrir.apos.execucao=true

# -------------------------------------------
# Anthropic API
# -------------------------------------------
anthropic.model=claude-sonnet-4-20250514
anthropic.api.url=https://api.anthropic.com/v1/messages
