name: Regression Tests

on:
  schedule:
    # Roda seg–sex às 6h UTC (3h BRT)
    - cron: '0 6 * * 1-5'
  workflow_dispatch:

jobs:
  regression-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Instalar Playwright browsers
      run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

    - name: Resolver dependências Maven
      run: mvn dependency:resolve

    - name: Executar testes de regressão
      env:
        QA_USUARIO: ${{ secrets.QA_USUARIO }}
        QA_SENHA: ${{ secrets.QA_SENHA }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        HEADLESS: "true"
      run: mvn test -Pcucumber.filter.tags="@regression"

    - name: Upload relatório HTML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: regression-report
        path: output/reports/relatorio.html
        retention-days: 30

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: regression-screenshots
        path: output/screenshots/
        retention-days: 7

    - name: Notificar falha (opcional)
      if: failure()
      run: |
        echo "⚠️ Testes de regressão falharam!"
        echo "Verifique os artifacts para mais detalhes."
