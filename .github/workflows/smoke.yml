name: Smoke Tests

on:
  push:
    branches: [ main, develop, 'feature/**' ]
  pull_request:
    branches: [ main, develop ]

jobs:
  smoke-tests:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout código
      uses: actions/checkout@v4

    - name: Setup Java 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Instalar Playwright browsers
      run: mvn exec:java -e -Dexec.mainClass=com.microsoft.playwright.CLI -Dexec.args="install chromium"

    - name: Resolver dependências Maven
      run: mvn dependency:resolve

    - name: Executar testes smoke
      env:
        SINNC_USUARIO: ${{ secrets.SINNC_USUARIO }}
        SINNC_SENHA: ${{ secrets.SINNC_SENHA }}
        ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        HEADLESS: "true"
      run: mvn test -Pcucumber.filter.tags="@smoke"

    - name: Upload relatório HTML
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: smoke-report
        path: output/reports/relatorio.html
        retention-days: 30

    - name: Upload screenshots
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: smoke-screenshots
        path: output/screenshots/
        retention-days: 7
